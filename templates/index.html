<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NanoGPT Prompteer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0a0a0f;
            --bg-panel: #12121a;
            --bg-elevated: #1a1a26;
            --bg-input: #16161f;
            --border-subtle: #25253300;
            --border-strong: #2a2a3a;
            --accent: #818cf8;
            --accent-bright: #a5b4fc;
            --accent-dim: #6366f1;
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
        }
        * { font-family: 'Inter', -apple-system, sans-serif; }
        body {
            background: var(--bg-base);
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99,102,241,0.12), transparent),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(139,92,246,0.08), transparent);
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        /* Glassmorphism panel */
        .glass {
            background: rgba(18, 18, 26, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.06);
        }
        .glass-strong {
            background: rgba(26, 26, 38, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.08);
        }

        /* Inputs */
        .field {
            background: var(--bg-input);
            border: 1px solid var(--border-strong);
            transition: all 0.2s ease;
        }
        .field:focus, .field:focus-within {
            border-color: var(--accent-dim);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        }
        select.field option { background: var(--bg-elevated); color: var(--text-primary); }

        /* Buttons */
        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #7c3aed 100%);
            box-shadow: 0 4px 14px rgba(99,102,241,0.3), inset 0 1px 0 rgba(255,255,255,0.15);
            transition: all 0.2s ease;
        }
        .btn-primary:hover:not(:disabled) {
            box-shadow: 0 6px 20px rgba(99,102,241,0.45), inset 0 1px 0 rgba(255,255,255,0.2);
            transform: translateY(-1px);
        }
        .btn-primary:active:not(:disabled) { transform: translateY(0); }
        .btn-ghost {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.15s ease;
        }
        .btn-ghost:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); }

        /* Sidebar item */
        .history-item {
            transition: all 0.15s ease;
            border: 1px solid transparent;
        }
        .history-item:hover {
            background: rgba(255,255,255,0.04);
            border-color: rgba(255,255,255,0.06);
        }
        .history-item.active {
            background: rgba(99,102,241,0.1);
            border-color: rgba(99,102,241,0.3);
        }

        /* Markdown / Prose */
        .prose { color: #d4d4d8; line-height: 1.7; }
        .prose h1, .prose h2, .prose h3, .prose h4 {
            color: #fafafa; font-weight: 700; margin-top: 1.4em; margin-bottom: 0.5em;
            line-height: 1.3;
        }
        .prose h1 { font-size: 1.6em; }
        .prose h2 { font-size: 1.35em; border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 0.3em; }
        .prose h3 { font-size: 1.15em; }
        .prose p { margin-bottom: 1em; }
        .prose ul, .prose ol { margin-left: 1.4em; margin-bottom: 1em; }
        .prose ul { list-style: none; }
        .prose ul li { position: relative; margin-bottom: 0.3em; padding-left: 1em; }
        .prose ul li::before { content: '→'; position: absolute; left: 0; color: var(--accent); font-weight: 600; }
        .prose ol { list-style: decimal; }
        .prose ol li { margin-bottom: 0.3em; }
        .prose li > ul, .prose li > ol { margin-top: 0.3em; }
        .prose code {
            background: rgba(129,140,248,0.12); padding: 0.15em 0.4em; border-radius: 4px;
            font-family: 'JetBrains Mono', monospace; font-size: 0.875em; color: #c4b5fd;
            border: 1px solid rgba(129,140,248,0.15);
        }
        .prose pre {
            background: #0d0d14; padding: 1.1em; border-radius: 10px; overflow-x: auto;
            margin-bottom: 1em; border: 1px solid rgba(255,255,255,0.08);
            position: relative;
        }
        .prose pre code {
            background: transparent; padding: 0; border: none; color: #e4e4e7; font-size: 0.85em;
        }
        .prose a { color: var(--accent-bright); text-decoration: none; border-bottom: 1px solid rgba(165,180,252,0.3); }
        .prose a:hover { border-bottom-color: var(--accent-bright); }
        .prose blockquote {
            border-left: 3px solid var(--accent-dim); padding-left: 1em; margin: 1em 0;
            color: #a1a1aa; font-style: italic;
        }
        .prose table { width: 100%; border-collapse: collapse; margin-bottom: 1em; }
        .prose th, .prose td { border: 1px solid rgba(255,255,255,0.08); padding: 0.6em 0.8em; text-align: left; }
        .prose th { background: rgba(99,102,241,0.1); color: #fafafa; font-weight: 600; }
        .prose hr { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 1.5em 0; }

        /* Copy Button for Codeblocks */
        .copy-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            padding: 0.25rem 0.5rem;
            font-size: 0.75rem;
            background: rgba(255,255,255,0.1);
            color: #d4d4d8;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 0.375rem;
            cursor: pointer;
            transition: all 0.2s;
            opacity: 0;
            z-index: 10;
            font-family: 'Inter', sans-serif;
        }
        .prose pre:hover .copy-btn { opacity: 1; }
        .copy-btn:hover { background: rgba(255,255,255,0.2); }

        /* Loader */
        .loader {
            border: 2px solid rgba(255,255,255,0.1);
            border-top: 2px solid var(--accent);
            border-radius: 50%; width: 18px; height: 18px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Dot pulse animation */
        .dot-pulse { display: inline-flex; gap: 4px; align-items: center; }
        .dot-pulse span {
            width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
            animation: dotPulse 1.4s ease-in-out infinite;
        }
        .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
        .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotPulse {
            0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
            30% { opacity: 1; transform: scale(1); }
        }

        /* Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        /* File chip */
        .file-chip {
            background: rgba(99,102,241,0.1);
            border: 1px solid rgba(99,102,241,0.25);
            transition: all 0.15s;
        }
        .file-chip:hover { border-color: rgba(99,102,241,0.5); }

        /* Logo gradient text */
        .gradient-text {
            background: linear-gradient(135deg, #a5b4fc 0%, #c4b5fd 50%, #f0abfc 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Model tag chip */
        .model-tag {
            background: rgba(99,102,241,0.15);
            border: 1px solid rgba(99,102,241,0.3);
            transition: all 0.15s;
            font-size: 12px;
        }
        .model-tag:hover { border-color: rgba(99,102,241,0.5); }
        .model-tag .remove-tag { cursor: pointer; color: rgba(165,180,252,0.6); transition: color 0.15s; }
        .model-tag .remove-tag:hover { color: #f87171; }

        /* Toggle switch */
        .toggle-track {
            width: 36px; height: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            position: relative;
            cursor: pointer;
            transition: background 0.2s;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .toggle-track.active { background: rgba(99,102,241,0.5); border-color: rgba(99,102,241,0.6); }
        .toggle-track .toggle-knob {
            width: 14px; height: 14px;
            background: #d4d4d8;
            border-radius: 50%;
            position: absolute;
            top: 2px; left: 2px;
            transition: all 0.2s;
        }
        .toggle-track.active .toggle-knob { left: 18px; background: #a5b4fc; }

        /* Multi-response panel */
        .responses-row {
            display: flex;
            gap: 1rem;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding-bottom: 0.5rem;
        }
        .responses-row::-webkit-scrollbar { height: 6px; }
        .responses-row::-webkit-scrollbar-track { background: transparent; }
        .responses-row::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        .responses-row::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
        .response-panel {
            border: 1px solid rgba(255,255,255,0.06);
            transition: border-color 0.2s;
            min-width: min(600px, 85vw);
            max-width: min(800px, 85vw);
            flex: 1 0 0;
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            max-height: 75vh;
        }
        .responses-row.single .response-panel {
            min-width: 0;
            max-width: 100%;
            flex: 1;
            max-height: none;
        }
        .response-panel:hover { border-color: rgba(255,255,255,0.12); }
        .response-panel-header {
            background: rgba(99,102,241,0.06);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            flex-shrink: 0;
        }
        .panel-content {
            overflow-y: auto;
            flex: 1;
        }
        .panel-content::-webkit-scrollbar { width: 6px; }
        .panel-content::-webkit-scrollbar-track { background: transparent; }
        .panel-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        .panel-content::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        /* Model dropdown item */
        .model-item {
            transition: all 0.1s;
            border-left: 2px solid transparent;
        }
        .model-item:hover {
            background: rgba(99,102,241,0.12);
            border-left-color: var(--accent);
        }
        .model-item.selected {
            background: rgba(99,102,241,0.08);
            border-left-color: var(--accent-dim);
        }

        /* Subtle entrance animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeInUp 0.3s ease forwards; }

        /* Glow accent */
        .accent-glow { box-shadow: 0 0 24px rgba(99,102,241,0.15); }

        /* Context thread visual link */
        .context-thread {
            position: relative;
            padding-left: 20px !important;
        }
        .context-thread::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 0;
            bottom: 0;
            width: 2px;
            border-radius: 1px;
            background: var(--thread-color, rgba(99,102,241,0.25));
        }
        .context-thread.thread-first::before { top: 50%; }
        .context-thread.thread-last::before { bottom: 50%; }
        .context-thread.thread-only::before { display: none; }
        .context-thread .thread-dot {
            position: absolute;
            left: 4px;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent-dim);
            border: 2px solid var(--bg-panel);
        }
        .context-thread.thread-first .thread-dot { top: 50%; }
        .context-thread.thread-last .thread-dot { top: 50%; }

        /* Sidebar collapse */
        body.sidebar-collapsed #sidebar {
            width: 0 !important;
            min-width: 0 !important;
            overflow: hidden;
            border: none;
            padding: 0;
        }
        body.sidebar-collapsed #sidebar > * { opacity: 0; transition: opacity 0.15s; }
        #sidebar > * { opacity: 1; transition: opacity 0.15s; }

        /* Textarea resize handle hidden but auto-grow feel */
        textarea { field-sizing: content; }
    </style>
</head>
<body class="text-zinc-100 min-h-screen flex overflow-hidden selection:bg-indigo-500/30">

    <div id="sidebarOverlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-10 hidden md:hidden" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="w-[280px] min-w-[280px] glass flex flex-col h-screen fixed md:relative transition-all duration-300 -translate-x-full md:translate-x-0 z-20 border-r border-white/5">
        <!-- Logo / Brand -->
        <div class="px-5 py-5 border-b border-white/5 flex items-center justify-between">
            <div class="flex items-center gap-2.5">
                <div>
                    <div class="font-bold text-[15px] leading-tight">Prompteer</div>
                </div>
            </div>
            <button onclick="toggleSidebar()" class="text-zinc-500 hover:text-white text-2xl leading-none">×</button>
        </div>

        <div class="p-3">
            <button onclick="newChat()" class="w-full py-2.5 btn-primary rounded-lg font-semibold text-sm flex items-center justify-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
                New Chat
            </button>
        </div>

        <div class="px-4 pt-1 pb-2">
            <div class="text-[10px] uppercase tracking-wider text-zinc-600 font-semibold">Recent</div>
        </div>
        <div id="historyList" class="flex-1 overflow-y-auto px-2 pb-2 space-y-0.5 custom-scrollbar"></div>

        <div class="p-3 border-t border-white/5 space-y-2">
            <button onclick="exportHistory()" class="w-full text-xs text-zinc-400 hover:text-indigo-300 transition py-1.5 flex items-center justify-center gap-1.5">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                Export Backup
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <!-- Header -->
        <header class="px-5 py-3.5 border-b border-white/5 flex items-center glass-strong z-10">
            <button onclick="toggleSidebar()" class="mr-3 text-zinc-400 hover:text-white transition">
                <svg id="sidebarToggleIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
            <h1 class="text-base font-semibold flex items-center gap-2">
                <span class="gradient-text">NanoGPT</span>
                <span class="text-zinc-600 font-normal">/</span>
                <span class="text-zinc-400 font-normal">Prompteer</span>
            </h1>
            <div class="ml-auto flex items-center gap-2 text-xs text-zinc-500">
                <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                <span>Connected</span>
            </div>
        </header>

        <div id="mainScrollContainer" class="flex-1 overflow-y-auto custom-scrollbar">
            <div class="max-w-5xl mx-auto px-4 py-6">

                <!-- Config Card -->
                <div class="glass rounded-2xl p-6 md:p-8 mb-6 animate-in">
                    <!-- API Key & Mode -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 mb-5 md:mb-7">
                        <div>
                            <label class="block text-xs md:text-sm font-semibold mb-1.5 md:mb-2 text-zinc-400 uppercase tracking-wide">API Key</label>
                            <input type="password" id="apiKey" placeholder="sk-..." class="field w-full px-3.5 md:px-4 py-2.5 md:py-3.5 rounded-lg text-sm md:text-base text-zinc-100 placeholder-zinc-600 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs md:text-sm font-semibold mb-1.5 md:mb-2 text-zinc-400 uppercase tracking-wide">Search Mode</label>
                            <select id="searchMode" class="field w-full px-3.5 md:px-4 py-2.5 md:py-3.5 rounded-lg text-sm md:text-base text-zinc-100 outline-none cursor-pointer">
                                <option value="">None</option>
                                <option value=":online">Web Search</option>
                                <option value=":online/linkup">Linkup</option>
                                <option value=":online/linkup-deep">Linkup Deep</option>
                            </select>
                        </div>
                    </div>

                    <!-- Model Selector (Multi) -->
                    <div class="mb-5 md:mb-7">
                        <label class="block text-xs md:text-sm font-semibold mb-1.5 md:mb-2 text-zinc-400 uppercase tracking-wide">Models <span id="modelCount" class="text-indigo-400/60 font-normal normal-case"></span></label>
                        <div id="selectedModelTags" class="flex flex-wrap gap-1.5 mb-2 hidden"></div>
                        <div class="flex gap-2">
                            <div class="relative flex-1">
                                <input type="text" id="modelSearch" placeholder="Search and select models..." class="field w-full px-3.5 md:px-4 py-2.5 md:py-3.5 rounded-lg text-sm md:text-base text-zinc-100 placeholder-zinc-600 outline-none" autocomplete="off">
                                <svg class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-600 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                                <div id="modelDropdown" class="absolute z-30 w-full mt-1.5 glass-strong rounded-lg shadow-2xl max-h-60 overflow-y-auto hidden custom-scrollbar"></div>
                            </div>
                            <button onclick="fetchModels()" class="btn-ghost px-3.5 py-2.5 rounded-lg text-sm text-zinc-300 flex items-center gap-1.5">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                            </button>
                        </div>
                        <!-- Model Price Indicator -->
                        <div id="modelPriceInfo" class="mt-2 text-xs font-mono hidden"></div>
                    </div>

                    <!-- Files -->
                    <div id="fileList" class="mb-4 flex flex-wrap gap-2"></div>

                    <!-- Context Toggle -->
                    <div class="mb-4 flex items-center justify-between">
                        <div class="flex items-center gap-2.5">
                            <div id="contextToggle" class="toggle-track active" onclick="toggleContext()">
                                <div class="toggle-knob"></div>
                            </div>
                            <div>
                                <span class="text-sm text-zinc-300 font-medium">Chat Context</span>
                                <span class="text-[11px] text-zinc-500 ml-1.5">Include conversation history</span>
                            </div>
                        </div>
                        <button onclick="clearChatContext()" class="text-[11px] text-zinc-500 hover:text-red-400 transition px-2 py-1 rounded hover:bg-white/5" title="Clear conversation context">Clear Context</button>
                    </div>

                    <!-- Prompt -->
                    <div class="mb-4 md:mb-6">
                        <label class="block text-xs md:text-sm font-semibold mb-1.5 md:mb-2 text-zinc-400 uppercase tracking-wide">Prompt</label>
                        <div id="promptDropZone" class="relative field rounded-lg transition-colors">
                            <textarea id="prompt" rows="6" class="w-full px-3.5 md:px-4 py-3 md:py-4 pr-12 pb-10 bg-transparent border-none outline-none resize-none text-sm md:text-base text-zinc-100 placeholder-zinc-600" placeholder="Ask anything, describe files, or drag & drop here..."></textarea>
                            <input type="file" id="fileInput" class="hidden" multiple>
                            <button type="button" onclick="document.getElementById('fileInput').click()" class="absolute right-2.5 bottom-2.5 p-2 text-zinc-500 hover:text-indigo-400 hover:bg-white/5 rounded-lg transition" title="Attach Files">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
                                </svg>
                            </button>
                            <div id="dropOverlay" class="absolute inset-0 bg-indigo-500/10 border-2 border-dashed border-indigo-400/50 rounded-lg flex items-center justify-center pointer-events-none opacity-0 transition-opacity z-10">
                                <span class="text-indigo-300 font-medium text-sm flex items-center gap-2">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
                                    Drop to attach
                                </span>
                            </div>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="flex gap-2.5">
                        <button id="sendBtn" onclick="sendChat()" class="flex-1 py-3 btn-primary rounded-lg font-semibold text-sm flex items-center justify-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
                            Send Message
                        </button>
                        <button id="stopBtn" onclick="stopChat()" class="hidden py-3 px-5 bg-red-500/15 border border-red-500/30 text-red-400 rounded-lg font-semibold text-sm hover:bg-red-500/25 transition flex items-center justify-center gap-2">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1.5"/></svg>
                            Stop
                        </button>
                    </div>
                </div>

            </div><!-- close max-w-5xl -->

            <!-- Responses (multi-model, side-by-side, full width) -->
            <div id="responsesContainer" class="responses-row hidden animate-in px-4"></div>

            <div class="max-w-5xl mx-auto px-4">
                <!-- Auto Scroll Button Container -->
                <div class="flex justify-center mt-6 mb-8 hidden" id="autoScrollContainer">
                    <button id="autoScrollBtn" onclick="toggleAutoScroll()" class="px-4 py-2 btn-ghost rounded-full shadow-lg text-zinc-300 text-xs font-semibold flex items-center gap-2 transition-all border border-white/10">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 14l-7 7m0 0l-7-7m7 7V3"/></svg>
                        <span id="autoScrollText">Auto-Scroll: Off</span>
                    </button>
                </div>

                <div class="h-8"></div>
            </div>
        </div>
    </main>

    <!-- Floating Thinking Indicator -->
    <div id="thinkingIndicator" class="fixed bottom-6 right-6 z-50 hidden glass-strong rounded-lg px-4 py-3 shadow-2xl border border-white/10 text-xs text-zinc-300 flex items-center gap-2 animate-in">
        <span class="dot-pulse"><span></span><span></span><span></span></span>
        <span id="thinkingStats">Thinking...</span>
    </div>

    <!-- Multi-model thinking panel -->
    <div id="multiThinkingPanel" class="fixed bottom-6 right-6 z-50 hidden glass-strong rounded-lg shadow-2xl border border-white/10 text-xs animate-in max-w-xs">
        <div class="px-3 py-2 border-b border-white/5 text-zinc-400 font-semibold text-[10px] uppercase tracking-wider">Streaming</div>
        <div id="multiThinkingList" class="p-2 space-y-1"></div>
    </div>

    <script>
        let uploadedFiles = [];
        let allModels = [];
        let modelsMap = {};
        let chatHistory = [];
        let currentChatId = null;
        let currentSessionId = null;
        let abortControllers = {};
        let favoriteModels = JSON.parse(localStorage.getItem('nanogpt_favorite_models') || '[]');
        let selectedModels = JSON.parse(localStorage.getItem('nanogpt_selected_models') || '[]');
        let contextEnabled = localStorage.getItem('nanogpt_context') !== 'false';
        let chatMessages = [];

        let autoScrollEnabled = localStorage.getItem('nanogpt_autoscroll') !== 'false';
        const mainScrollContainer = document.getElementById('mainScrollContainer');
        const autoScrollContainer = document.getElementById('autoScrollContainer');
        const autoScrollBtn = document.getElementById('autoScrollBtn');
        const autoScrollText = document.getElementById('autoScrollText');

        function updateAutoScrollUI() {
            if (autoScrollEnabled) {
                autoScrollBtn.classList.add('btn-primary');
                autoScrollBtn.classList.remove('btn-ghost');
                autoScrollText.textContent = 'Auto-Scroll: On';
            } else {
                autoScrollBtn.classList.remove('btn-primary');
                autoScrollBtn.classList.add('btn-ghost');
                autoScrollText.textContent = 'Auto-Scroll: Off';
            }
        }
        updateAutoScrollUI();

        function toggleAutoScroll() {
            autoScrollEnabled = !autoScrollEnabled;
            localStorage.setItem('nanogpt_autoscroll', autoScrollEnabled.toString());
            updateAutoScrollUI();
            if (autoScrollEnabled) {
                mainScrollContainer.scrollTo({ top: mainScrollContainer.scrollHeight, behavior: 'smooth' });
            }
        }

        const apiKeyInput = document.getElementById('apiKey');
        const modelSearch = document.getElementById('modelSearch');
        const modelDropdown = document.getElementById('modelDropdown');
        const selectedModelTagsEl = document.getElementById('selectedModelTags');
        const modelCountEl = document.getElementById('modelCount');
        const searchMode = document.getElementById('searchMode');
        const fileList = document.getElementById('fileList');
        const promptDropZone = document.getElementById('promptDropZone');
        const dropOverlay = document.getElementById('dropOverlay');
        const fileInput = document.getElementById('fileInput');
        const responsesContainer = document.getElementById('responsesContainer');
        const sendBtn = document.getElementById('sendBtn');
        const stopBtn = document.getElementById('stopBtn');

        apiKeyInput.value = localStorage.getItem('nanogpt_api_key') || '';
        searchMode.value = localStorage.getItem('nanogpt_mode') || '';

        apiKeyInput.addEventListener('change', () => {
            localStorage.setItem('nanogpt_api_key', apiKeyInput.value);
            fetchModels();
        });

        searchMode.addEventListener('change', () => {
            localStorage.setItem('nanogpt_mode', searchMode.value);
        });

        modelSearch.addEventListener('focus', () => {
            renderModelDropdown(modelSearch.value);
            modelDropdown.classList.remove('hidden');
        });

        modelSearch.addEventListener('input', () => {
            renderModelDropdown(modelSearch.value);
            modelDropdown.classList.remove('hidden');
        });

        document.addEventListener('click', (e) => {
            if (!modelSearch.contains(e.target) && !modelDropdown.contains(e.target)) {
                modelDropdown.classList.add('hidden');
            }
        });

        function toggleContext() {
            contextEnabled = !contextEnabled;
            localStorage.setItem('nanogpt_context', contextEnabled.toString());
            const track = document.getElementById('contextToggle');
            if (contextEnabled) { track.classList.add('active'); }
            else { track.classList.remove('active'); }
        }

        function clearChatContext() {
            chatMessages = [];
            currentSessionId = null;
            renderChatContextIndicator();
        }

        function renderChatContextIndicator() {
            const count = chatMessages.filter(m => m.role === 'user').length;
            const btn = document.querySelector('button[onclick="clearChatContext()"]');
            if (btn) {
                btn.textContent = count > 0 ? `Clear Context (${count} turns)` : 'Clear Context';
            }
        }

        function renderSelectedModelTags() {
            selectedModelTagsEl.innerHTML = '';
            if (selectedModels.length === 0) {
                selectedModelTagsEl.classList.add('hidden');
                modelCountEl.textContent = '';
                return;
            }
            selectedModelTagsEl.classList.remove('hidden');
            modelCountEl.textContent = `(${selectedModels.length} selected)`;
            selectedModels.forEach(model => {
                const tag = document.createElement('div');
                tag.className = 'model-tag px-2.5 py-1 rounded-md flex items-center gap-1.5 text-indigo-200';
                tag.innerHTML = `<span class="truncate max-w-[200px]">${escapeHtml(model)}</span><span class="remove-tag text-xs font-bold" onclick="removeModel('${escapeHtml(model)}')">×</span>`;
                selectedModelTagsEl.appendChild(tag);
            });
        }

        function toggleModelInSelection(model) {
            const idx = selectedModels.indexOf(model);
            if (idx > -1) {
                selectedModels.splice(idx, 1);
            } else {
                selectedModels.push(model);
            }
            localStorage.setItem('nanogpt_selected_models', JSON.stringify(selectedModels));
            renderSelectedModelTags();
            renderModelDropdown(modelSearch.value);
            updateModelPrice();
        }

        function removeModel(model) {
            selectedModels = selectedModels.filter(m => m !== model);
            localStorage.setItem('nanogpt_selected_models', JSON.stringify(selectedModels));
            renderSelectedModelTags();
            renderModelDropdown(modelSearch.value);
            updateModelPrice();
        }

        function toggleFavorite(modelId) {
            const idx = favoriteModels.indexOf(modelId);
            if (idx > -1) { favoriteModels.splice(idx, 1); }
            else { favoriteModels.push(modelId); }
            localStorage.setItem('nanogpt_favorite_models', JSON.stringify(favoriteModels));
            renderModelDropdown(modelSearch.value);
        }

        function updateModelPrice() {
            const priceInfo = document.getElementById('modelPriceInfo');
            if (selectedModels.length === 0) { priceInfo.classList.add('hidden'); return; }

            let html = '<div class="space-y-1 mt-1">';
            selectedModels.forEach(modelId => {
                const modelData = modelsMap[modelId];
                if (!modelData) return;
                const pricing = modelData.pricing || {};
                let promptPrice = parseFloat(pricing.prompt || pricing.input || 0);
                let completionPrice = parseFloat(pricing.completion || pricing.output || 0);
                const unit = (pricing.unit || "").toLowerCase();
                let inputPricePer1M = 0, outputPricePer1M = 0, hasPricing = false;

                if (promptPrice > 0 || completionPrice > 0) {
                    hasPricing = true;
                    if (unit.includes("million") || unit.includes("1m")) { inputPricePer1M = promptPrice; outputPricePer1M = completionPrice; }
                    else if (unit.includes("k") || unit.includes("1k") || unit.includes("thousand")) { inputPricePer1M = promptPrice * 1000; outputPricePer1M = completionPrice * 1000; }
                    else { if (promptPrice > 0.1 && !unit.includes("token")) { inputPricePer1M = promptPrice; outputPricePer1M = completionPrice; } else { inputPricePer1M = promptPrice * 1000000; outputPricePer1M = completionPrice * 1000000; } }
                }

                const shortName = modelId.length > 35 ? modelId.substring(0, 32) + '...' : modelId;
                if (hasPricing) {
                    html += `<div class="flex items-center gap-2"><span class="text-zinc-500 truncate max-w-[140px]" title="${escapeHtml(modelId)}">${escapeHtml(shortName)}</span><span class="text-emerald-400">$${inputPricePer1M.toFixed(2)}</span><span class="text-zinc-700">/</span><span class="text-amber-400">$${outputPricePer1M.toFixed(2)}</span><span class="text-zinc-600">/1M</span></div>`;
                } else {
                    html += `<div class="flex items-center gap-2"><span class="text-zinc-500 truncate max-w-[140px]" title="${escapeHtml(modelId)}">${escapeHtml(shortName)}</span><span class="text-zinc-600 italic">No pricing</span></div>`;
                }
            });
            html += '</div>';
            priceInfo.innerHTML = html;
            priceInfo.classList.remove('hidden');
        }

        function renderModelDropdown(filter) {
            modelDropdown.innerHTML = '';
            const filtered = allModels.filter(m => m.toLowerCase().includes(filter.toLowerCase()));

            filtered.sort((a, b) => {
                const aFav = favoriteModels.includes(a);
                const bFav = favoriteModels.includes(b);
                if (aFav && !bFav) return -1;
                if (!aFav && bFav) return 1;
                return a.localeCompare(b);
            });

            if (filtered.length === 0) {
                modelDropdown.innerHTML = '<div class="p-3 text-zinc-500 text-sm text-center">No models found</div>';
                return;
            }

            filtered.forEach(model => {
                const isFav = favoriteModels.includes(model);
                const isSel = selectedModels.includes(model);
                const div = document.createElement('div');
                div.className = `model-item p-2.5 px-3 cursor-pointer text-sm text-zinc-300 flex items-center gap-2 ${isSel ? 'selected' : ''}`;

                const checkSvg = isSel
                    ? `<svg class="w-4 h-4 text-indigo-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>`
                    : `<div class="w-4 h-4 flex-shrink-0 border border-zinc-600 rounded"></div>`;

                const starSvg = isFav
                    ? `<svg class="w-3.5 h-3.5 text-yellow-400 fill-current flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>`
                    : `<svg class="w-3.5 h-3.5 text-zinc-600 hover:text-yellow-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" /></svg>`;

                div.innerHTML = `
                    <span class="check-area flex items-center justify-center flex-shrink-0">${checkSvg}</span>
                    <span class="truncate flex-1 mr-1 model-name"></span>
                    <button class="star-btn p-1 rounded hover:bg-white/10 transition flex items-center justify-center flex-shrink-0">${starSvg}</button>
                `;
                div.querySelector('.model-name').textContent = model;

                div.querySelector('.model-name').addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    toggleModelInSelection(model);
                });
                div.querySelector('.check-area').addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    toggleModelInSelection(model);
                });
                div.querySelector('.star-btn').addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    toggleFavorite(model);
                });

                modelDropdown.appendChild(div);
            });
        }

        promptDropZone.addEventListener('dragenter', (e) => { e.preventDefault(); dropOverlay.classList.remove('opacity-0'); });
        promptDropZone.addEventListener('dragover', (e) => { e.preventDefault(); });
        promptDropZone.addEventListener('dragleave', (e) => {
            if (!e.relatedTarget || !promptDropZone.contains(e.relatedTarget)) dropOverlay.classList.add('opacity-0');
        });
        promptDropZone.addEventListener('drop', (e) => {
            e.preventDefault(); dropOverlay.classList.add('opacity-0'); handleFiles(e.dataTransfer.files);
        });
        window.addEventListener('dragover', (e) => e.preventDefault());
        window.addEventListener('drop', (e) => e.preventDefault());
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        function handleFiles(files) {
            for (let file of files) {
                if (file.size > 4 * 1024 * 1024) { alert(`File ${file.name} exceeds 4MB limit.`); continue; }
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => { uploadedFiles.push({ name: file.name, type: file.type, data: e.target.result }); renderFileList(); };
                    reader.readAsDataURL(file);
                } else if (file.type.startsWith('text/') || file.name.match(/\.(txt|md|csv|json|py|js|html|css)$/i)) {
                    const reader = new FileReader();
                    reader.onload = (e) => { uploadedFiles.push({ name: file.name, type: file.type || 'text/plain', data: e.target.result }); renderFileList(); };
                    reader.readAsText(file);
                } else { alert(`Unsupported file type for ${file.name}.`); }
            }
        }

        function renderFileList() {
            fileList.innerHTML = '';
            uploadedFiles.forEach((file, index) => {
                const div = document.createElement('div');
                div.className = 'file-chip px-3 py-1.5 rounded-md flex items-center gap-2 text-xs text-zinc-300';
                const isImage = file.type.startsWith('image/');
                div.innerHTML = `<svg class="w-3.5 h-3.5 text-indigo-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="${isImage ? 'M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z' : 'M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z'}"/></svg><span class="max-w-[120px] truncate">${file.name}</span><button onclick="removeFile(${index})" class="text-zinc-500 hover:text-red-400 ml-1 text-base leading-none">×</button>`;
                fileList.appendChild(div);
            });
        }

        function removeFile(index) { uploadedFiles.splice(index, 1); renderFileList(); }

        async function fetchModels() {
            const apiKey = apiKeyInput.value;
            if (!apiKey) return;
            modelSearch.value = 'Loading...'; modelSearch.disabled = true;
            try {
                const res = await fetch(`/api/models?api_key=${apiKey}`);
                const data = await res.json();
                let models = data.data || data;
                modelsMap = {};
                models.forEach(m => { const id = m.id || m; modelsMap[id] = m; });
                allModels = Object.keys(modelsMap).sort((a, b) => a.localeCompare(b));

                // Restore previously selected models if still available
                selectedModels = selectedModels.filter(m => allModels.includes(m));
                if (selectedModels.length === 0) {
                    const savedModel = localStorage.getItem('nanogpt_model');
                    if (savedModel && allModels.includes(savedModel)) {
                        selectedModels = [savedModel];
                    } else if (allModels.length > 0) {
                        selectedModels = [allModels[0]];
                    }
                }
                localStorage.setItem('nanogpt_selected_models', JSON.stringify(selectedModels));

                modelSearch.value = '';
                renderModelDropdown('');
                renderSelectedModelTags();
                updateModelPrice();
            } catch (err) { modelSearch.value = 'Error loading models'; console.error(err); }
            finally { modelSearch.disabled = false; }
        }

        function toggleSidebar() {
            const isMobile = window.innerWidth < 768;
            if (isMobile) {
                document.getElementById('sidebar').classList.toggle('-translate-x-full');
                document.getElementById('sidebarOverlay').classList.toggle('hidden');
            } else {
                document.body.classList.toggle('sidebar-collapsed');
                localStorage.setItem('nanogpt_sidebar_collapsed', document.body.classList.contains('sidebar-collapsed'));
            }
        }

        // Restore sidebar state on desktop
        if (localStorage.getItem('nanogpt_sidebar_collapsed') === 'true') {
            document.body.classList.add('sidebar-collapsed');
        }

        async function initHistory() {
            try {
                const res = await fetch('/api/history');
                const data = await res.json();
                chatHistory = Array.isArray(data) ? data : [];
            } catch(e) { chatHistory = []; }
            renderHistory();
        }

        async function saveHistoryToServer() {
            try {
                await fetch('/api/history', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(chatHistory) });
            } catch (e) { console.error("Failed to save history:", e); }
        }

        function exportHistory() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(chatHistory, null, 2));
            const a = document.createElement('a');
            a.setAttribute("href", dataStr); a.setAttribute("download", "nanogpt_history_backup.json");
            document.body.appendChild(a); a.click(); a.remove();
        }

        function renderHistory() {
            const list = document.getElementById('historyList'); list.innerHTML = '';
            const sorted = [...chatHistory].sort((a, b) => b.timestamp - a.timestamp);
            if (sorted.length === 0) {
                list.innerHTML = '<div class="text-center text-zinc-600 text-xs mt-8 px-4">No conversations yet.<br>Start a new chat to begin.</div>';
                return;
            }

            // Build sessionId → indices map (in sorted order)
            const sessionGroups = {};
            sorted.forEach((chat, i) => {
                const sid = chat.sessionId;
                if (!sid) return;
                if (!sessionGroups[sid]) sessionGroups[sid] = [];
                sessionGroups[sid].push(i);
            });

            // For each index, determine thread position
            const threadInfo = {};
            for (const [sid, indices] of Object.entries(sessionGroups)) {
                if (indices.length < 2) {
                    indices.forEach(i => threadInfo[i] = 'only');
                } else {
                    indices.forEach((i, j) => {
                        if (j === 0) threadInfo[i] = 'first';
                        else if (j === indices.length - 1) threadInfo[i] = 'last';
                        else threadInfo[i] = 'middle';
                    });
                }
            }

            // Generate a stable color from sessionId
            function sessionColor(sid) {
                if (!sid) return 'rgba(99,102,241,0.25)';
                let hash = 0;
                for (let i = 0; i < sid.length; i++) hash = ((hash << 5) - hash) + sid.charCodeAt(i);
                const hue = Math.abs(hash) % 360;
                return `hsl(${hue}, 50%, 55%)`;
            }

            sorted.forEach((chat, i) => {
                const div = document.createElement('div');
                const position = threadInfo[i];
                let threadClass = '';
                if (position && position !== 'only') threadClass = 'context-thread thread-' + position;

                div.className = `history-item p-2.5 px-3 rounded-lg cursor-pointer flex justify-between items-start group ${currentChatId === chat.id ? 'active' : ''} ${threadClass}`;
                if (threadClass) {
                    div.style.setProperty('--thread-color', sessionColor(chat.sessionId));
                    // Override the ::before background with the session color
                }

                const title = chat.prompt.substring(0, 40) + (chat.prompt.length > 40 ? '...' : '') || 'New Chat';
                const models = chat.models || (chat.model ? [chat.model] : []);
                const modelBadge = models.length > 0
                    ? `<div class="text-[10px] text-indigo-300/70 truncate mt-0.5 font-mono">${models.length > 1 ? models.length + ' models' : escapeHtml(models[0])}</div>`
                    : '';

                const threadDot = (position && position !== 'only')
                    ? `<div class="thread-dot" style="background:${sessionColor(chat.sessionId)}"></div>`
                    : '';

                div.innerHTML = `<div class="flex-1 min-w-0" onclick="loadChat('${chat.id}')">
                                   <div class="truncate text-[13px] text-zinc-300">${escapeHtml(title)}</div>
                                   ${modelBadge}
                                 </div>
                                 <button onclick="event.stopPropagation(); deleteChat('${chat.id}')" class="text-zinc-600 hover:text-red-400 ml-2 opacity-0 group-hover:opacity-100 transition-opacity text-lg leading-none flex-shrink-0">×</button>
                                 ${threadDot}`;
                list.appendChild(div);
            });
        }

        function addToHistory(prompt, models, responses, mode, files, contextMessages) {
            const id = Date.now().toString();
            if (!currentSessionId) currentSessionId = 'sess_' + Date.now();
            const chatObj = {
                id,
                sessionId: currentSessionId,
                prompt,
                models: [...models],
                responses,
                mode,
                files: files.map(f => ({ name: f.name, type: f.type })),
                contextMessages: contextMessages || [],
                timestamp: Date.now()
            };
            chatHistory.push(chatObj);
            currentChatId = id;
            if (chatHistory.length > 50) chatHistory.shift();
            saveHistoryToServer();
            renderHistory();
            return id;
        }

        function loadChat(id) {
            const chat = chatHistory.find(c => c.id === id); if (!chat) return;
            currentChatId = id;
            currentSessionId = chat.sessionId || null;
            document.getElementById('prompt').value = chat.prompt;

            // Restore models
            const models = chat.models || (chat.model ? [chat.model] : []);
            selectedModels = models.filter(m => allModels.includes(m));
            localStorage.setItem('nanogpt_selected_models', JSON.stringify(selectedModels));
            renderSelectedModelTags();
            updateModelPrice();

            if (chat.mode !== undefined) searchMode.value = chat.mode;

            // Restore context messages
            chatMessages = chat.contextMessages || [];
            renderChatContextIndicator();

            uploadedFiles = []; renderFileList();

            // Render responses
            responsesContainer.innerHTML = '';
            responsesContainer.classList.remove('hidden');
            responsesContainer.classList.toggle('single', models.length <= 1);
            const responses = chat.responses || {};
            if (chat.apiResponse && !chat.responses) {
                // Legacy single-model format
                const model = chat.model || 'Unknown';
                const panel = createResponsePanel(model);
                responsesContainer.appendChild(panel);
                renderSingleResponse(panel, chat.apiResponse, model);
            } else {
                for (const model of models) {
                    const resp = responses[model];
                    if (resp) {
                        const panel = createResponsePanel(model);
                        responsesContainer.appendChild(panel);
                        renderSingleResponse(panel, resp, model);
                    }
                }
            }

            renderHistory();
            if (window.innerWidth < 768) toggleSidebar();
        }

        function deleteChat(id) {
            chatHistory = chatHistory.filter(c => c.id !== id); saveHistoryToServer();
            if (currentChatId === id) newChat(); renderHistory();
        }

        function newChat() {
            currentChatId = null;
            currentSessionId = null;
            document.getElementById('prompt').value = '';
            responsesContainer.innerHTML = '';
            responsesContainer.classList.add('hidden');
            chatMessages = [];
            uploadedFiles = [];
            renderFileList();
            renderHistory();
            renderChatContextIndicator();
        }

        function escapeHtml(text) {
            const div = document.createElement('div'); div.textContent = text; return div.innerHTML;
        }

        function addCopyButtons(container) {
            (container || document).querySelectorAll('.prose pre').forEach(pre => {
                if (pre.querySelector('.copy-btn')) return;
                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.innerText = 'Copy';
                btn.onclick = (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    const code = pre.querySelector('code')?.innerText || pre.innerText;
                    navigator.clipboard.writeText(code).then(() => {
                        btn.innerText = 'Copied!';
                        setTimeout(() => { btn.innerText = 'Copy'; }, 2000);
                    }).catch(() => {
                        btn.innerText = 'Error';
                    });
                };
                pre.appendChild(btn);
            });
        }

        function createResponsePanel(model) {
            const panel = document.createElement('div');
            panel.className = 'response-panel glass rounded-2xl animate-in';
            panel.setAttribute('data-model', model);
            const shortModel = model.length > 50 ? model.substring(0, 47) + '...' : model;
            panel.innerHTML = `
                <div class="response-panel-header px-5 py-3 flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full bg-indigo-400/60"></div>
                        <span class="text-sm font-semibold text-zinc-300 font-mono">${escapeHtml(shortModel)}</span>
                    </div>
                    <div class="panel-status text-[11px] text-zinc-500 flex items-center gap-1.5">
                        <div class="loader" style="width:14px;height:14px;border-width:1.5px;"></div>
                        <span>Connecting...</span>
                    </div>
                </div>
                <div class="p-5 min-h-[80px] prose max-w-none panel-content">
                    <div class="flex items-center gap-3 text-zinc-400 text-sm"><div class="loader"></div> Waiting for response...</div>
                </div>`;
            return panel;
        }

        function getModelPricing(model) {
            const modelData = modelsMap[model] || {};
            const pricing = modelData.pricing || {};
            let promptPrice = parseFloat(pricing.prompt || pricing.input || 0);
            let completionPrice = parseFloat(pricing.completion || pricing.output || 0);
            const unit = (pricing.unit || "").toLowerCase();
            let inputPricePerToken = 0, outputPricePerToken = 0, pricing_available = true;

            if (promptPrice > 0 || completionPrice > 0) {
                if (unit.includes("million") || unit.includes("1m")) { inputPricePerToken = promptPrice / 1000000; outputPricePerToken = completionPrice / 1000000; }
                else if (unit.includes("k") || unit.includes("1k") || unit.includes("thousand")) { inputPricePerToken = promptPrice / 1000; outputPricePerToken = completionPrice / 1000; }
                else { if (promptPrice > 0.1 && !unit.includes("token")) { inputPricePerToken = promptPrice / 1000000; outputPricePerToken = completionPrice / 1000000; } else { inputPricePerToken = promptPrice; outputPricePerToken = completionPrice; } }
            } else { pricing_available = false; }

            return { inputPricePerToken, outputPricePerToken, pricing_available };
        }

        function buildUsageHtml(usageData, model, mode) {
            const inputTokens = usageData.prompt_tokens || usageData.input_tokens || 0;
            const outputTokens = usageData.completion_tokens || usageData.output_tokens || 0;
            const totalTokens = usageData.total_tokens || (inputTokens + outputTokens);
            const { inputPricePerToken, outputPricePerToken, pricing_available } = getModelPricing(model);
            const searchFee = mode === ":online/linkup-deep" ? 0.06 : (mode.startsWith(":online") ? 0.006 : 0);
            const tokenCost = (inputTokens * inputPricePerToken) + (outputTokens * outputPricePerToken);
            const totalCost = tokenCost + searchFee;

            let html = `<div class="mt-6 pt-4 border-t border-white/5">
                <div class="flex flex-wrap items-center gap-2 mb-3">
                    <span class="text-[10px] uppercase tracking-wider text-zinc-600 font-semibold">Usage</span>
                </div>
                <div class="grid grid-cols-3 gap-3 mb-3">
                    <div class="bg-black/20 rounded-lg p-3 border border-white/5">
                        <div class="text-[10px] uppercase tracking-wide text-zinc-600 mb-1">Input</div>
                        <div class="text-sm font-semibold text-zinc-200 font-mono">${inputTokens.toLocaleString()}</div>
                    </div>
                    <div class="bg-black/20 rounded-lg p-3 border border-white/5">
                        <div class="text-[10px] uppercase tracking-wide text-zinc-600 mb-1">Output</div>
                        <div class="text-sm font-semibold text-zinc-200 font-mono">${outputTokens.toLocaleString()}</div>
                    </div>
                    <div class="bg-black/20 rounded-lg p-3 border border-white/5">
                        <div class="text-[10px] uppercase tracking-wide text-zinc-600 mb-1">Total</div>
                        <div class="text-sm font-semibold text-zinc-200 font-mono">${totalTokens.toLocaleString()}</div>
                    </div>
                </div>`;

            if (pricing_available || searchFee > 0) {
                html += `<div class="flex flex-wrap gap-2">`;
                if (pricing_available) html += `<div class="flex items-center gap-1.5 bg-emerald-500/10 border border-emerald-500/20 px-3 py-1.5 rounded-md text-xs"><span class="text-emerald-400/70">Token Cost</span><strong class="text-emerald-400 font-mono">$${tokenCost.toFixed(6)}</strong></div>`;
                if (searchFee > 0) html += `<div class="flex items-center gap-1.5 bg-amber-500/10 border border-amber-500/20 px-3 py-1.5 rounded-md text-xs"><span class="text-amber-400/70">Search Fee</span><strong class="text-amber-400 font-mono">$${searchFee.toFixed(3)}</strong></div>`;
                html += `<div class="flex items-center gap-1.5 bg-indigo-500/10 border border-indigo-500/20 px-3 py-1.5 rounded-md text-xs"><span class="text-indigo-300/70">Total</span><strong class="text-indigo-300 font-mono">$${totalCost.toFixed(6)}</strong></div></div>`;
            } else if (!usageData.prompt_tokens && !usageData.input_tokens) {
                html += `<div class="text-amber-500/60 text-xs">* Exact token usage not provided.</div>`;
            } else {
                html += `<div class="text-amber-500/60 text-xs">* Pricing metadata not available.</div>`;
            }
            html += `</div>`;
            return html;
        }

        function renderSingleResponse(panel, data, model) {
            const contentDiv = panel.querySelector('.panel-content');
            const statusDiv = panel.querySelector('.panel-status');
            const mode = searchMode.value;

            if (data.error) {
                statusDiv.innerHTML = `<span class="text-red-400">Error</span>`;
                contentDiv.innerHTML = `<div class="flex items-start gap-3 text-red-300"><svg class="w-5 h-5 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg><div><div class="font-semibold text-sm mb-1">Error</div><div class="text-sm text-red-300/80 font-mono">${typeof data.error === 'object' ? JSON.stringify(data.error) : data.error}</div></div></div>`;
            } else if (data.choices && data.choices.length > 0) {
                statusDiv.innerHTML = `<span class="text-emerald-400">Done</span>`;
                const choice = data.choices[0];
                const content = choice.message.content || "";
                const reasoning = choice.message.reasoning_content || "";
                let html = "";

                if (reasoning) {
                    html += `<details class="mb-5">
                               <summary class="cursor-pointer text-xs text-zinc-500 hover:text-zinc-300 transition select-none flex items-center gap-1.5">
                                   <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
                                   Reasoning Process · ${reasoning.length.toLocaleString()} chars
                               </summary>
                               <div class="mt-3 p-4 bg-black/30 rounded-lg border border-white/5 text-[13px] text-zinc-400 whitespace-pre-wrap font-mono leading-relaxed">${escapeHtml(reasoning)}</div>
                             </details>`;
                }

                try { html += marked.parse(content); } catch(e) { html += `<div class="whitespace-pre-wrap">${escapeHtml(content)}</div>`; }
                html += buildUsageHtml(data.usage || {}, model, mode);
                contentDiv.innerHTML = html;
                addCopyButtons(contentDiv);
            } else {
                statusDiv.innerHTML = `<span class="text-zinc-500">No content</span>`;
                contentDiv.innerHTML = `<pre class="text-xs font-mono text-zinc-400 overflow-x-auto">${JSON.stringify(data, null, 2)}</pre>`;
            }
        }

        function stopChat() {
            Object.values(abortControllers).forEach(c => c.abort());
            abortControllers = {};
        }

        function buildHistoryMessages() {
            if (!contextEnabled || chatMessages.length === 0) return [];
            return chatMessages.map(m => ({ role: m.role, content: m.content }));
        }

        async function sendChat() {
            const apiKey = apiKeyInput.value;
            const mode = searchMode.value;
            const promptText = document.getElementById('prompt').value;

            if (!apiKey) { alert('Please enter an API Key.'); return; }
            if (selectedModels.length === 0) { alert('Please select at least one model.'); return; }

            sendBtn.disabled = true;
            stopBtn.classList.remove('hidden');
            responsesContainer.innerHTML = '';
            responsesContainer.classList.remove('hidden');
            responsesContainer.classList.toggle('single', selectedModels.length === 1);
            autoScrollContainer.classList.remove('hidden');

            const history = buildHistoryMessages();
            const modelsToSend = [...selectedModels];
            abortControllers = {};

            // Create response panels for each model
            const panels = {};
            const streamData = {};
            modelsToSend.forEach(model => {
                const panel = createResponsePanel(model);
                responsesContainer.appendChild(panel);
                panels[model] = panel;
                streamData[model] = { reasoning: '', content: '', usageData: null };
            });

            // Update multi-thinking panel
            const multiThinkingPanel = document.getElementById('multiThinkingPanel');
            const multiThinkingList = document.getElementById('multiThinkingList');
            multiThinkingPanel.classList.remove('hidden');
            multiThinkingList.innerHTML = '';
            modelsToSend.forEach(model => {
                const shortName = model.length > 30 ? model.substring(0, 27) + '...' : model;
                const item = document.createElement('div');
                item.className = 'flex items-center gap-2 px-2 py-1 text-zinc-400';
                item.setAttribute('data-model', model);
                item.innerHTML = `<div class="loader" style="width:12px;height:12px;border-width:1.5px;"></div><span class="truncate">${escapeHtml(shortName)}</span>`;
                multiThinkingList.appendChild(item);
            });

            if (autoScrollEnabled) {
                mainScrollContainer.scrollTo({ top: mainScrollContainer.scrollHeight, behavior: 'smooth' });
            }

            // Launch parallel requests
            const promises = modelsToSend.map(async (model) => {
                const controller = new AbortController();
                abortControllers[model] = controller;
                const signal = controller.signal;
                const panel = panels[model];
                const sd = streamData[model];
                const statusDiv = panel.querySelector('.panel-status');
                const contentDiv = panel.querySelector('.panel-content');

                const { inputPricePerToken, outputPricePerToken } = getModelPricing(model);

                const updateUI = () => {
                    let html = "";
                    if (sd.reasoning) {
                        const estTokens = Math.ceil(sd.reasoning.length / 4);
                        const estCost = estTokens * outputPricePerToken;
                        html += `<details class="mb-5" open>
                                   <summary class="cursor-pointer text-xs text-zinc-500 hover:text-zinc-300 transition select-none flex items-center gap-1.5">
                                       <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
                                       Thinking · ~${estTokens.toLocaleString()} tokens · ~$${estCost.toFixed(6)}
                                   </summary>
                                   <div class="mt-3 p-4 bg-black/30 rounded-lg border border-white/5 text-[13px] text-zinc-400 whitespace-pre-wrap font-mono leading-relaxed max-h-[300px] overflow-y-auto custom-scrollbar">${escapeHtml(sd.reasoning)}</div>
                                 </details>`;
                        statusDiv.innerHTML = `<span class="text-amber-400">Thinking...</span>`;
                    }
                    if (sd.content) {
                        try { html += marked.parse(sd.content); } catch(e) { html += `<div class="whitespace-pre-wrap">${escapeHtml(sd.content)}</div>`; }
                        statusDiv.innerHTML = `<span class="text-indigo-400">Streaming...</span>`;
                    } else if (!sd.reasoning) {
                        html = '<div class="flex items-center gap-3 text-zinc-400 text-sm"><div class="loader"></div> Waiting for model response...</div>';
                    } else {
                        html += '<div class="flex items-center gap-3 mt-4 text-zinc-500 text-sm"><div class="loader"></div> Preparing final response...</div>';
                    }
                    contentDiv.innerHTML = html;
                    addCopyButtons(contentDiv);

                    // Update thinking panel
                    const thinkItem = multiThinkingList.querySelector(`[data-model="${CSS.escape(model)}"]`);
                    if (thinkItem) {
                        if (sd.reasoning || sd.content) {
                            const chars = sd.reasoning.length + sd.content.length;
                            thinkItem.innerHTML = `<span class="w-2 h-2 rounded-full bg-amber-400/60 flex-shrink-0"></span><span class="truncate text-amber-300/70">${chars.toLocaleString()} chars</span>`;
                        }
                    }

                    if (autoScrollEnabled) {
                        mainScrollContainer.scrollTop = mainScrollContainer.scrollHeight;
                    }
                };

                try {
                    const res = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ api_key: apiKey, model: model, suffix: mode, prompt: promptText, files: uploadedFiles, history }),
                        signal
                    });

                    if (!res.ok) {
                        const errorData = await res.json().catch(() => ({ error: res.statusText }));
                        throw new Error(typeof errorData.error === 'object' ? JSON.stringify(errorData.error) : errorData.error);
                    }

                    const reader = res.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = "";

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop();

                        for (const line of lines) {
                            const trimmed = line.trim();
                            if (!trimmed) continue;
                            let jsonStr = "";
                            if (trimmed.startsWith('data: ')) { jsonStr = trimmed.slice(6); }
                            else if (trimmed.startsWith('{')) { jsonStr = trimmed; }

                            if (jsonStr && jsonStr !== '[DONE]') {
                                try {
                                    const parsed = JSON.parse(jsonStr);
                                    if (parsed.error) throw new Error(typeof parsed.error === 'object' ? JSON.stringify(parsed.error) : parsed.error);
                                    if (parsed.usage) sd.usageData = parsed.usage;
                                    if (parsed.choices && parsed.choices.length > 0 && parsed.choices[0].message) {
                                        const msg = parsed.choices[0].message;
                                        if (msg.content) sd.content += msg.content;
                                        if (msg.reasoning_content) sd.reasoning += msg.reasoning_content;
                                    }
                                    const choice = parsed.choices?.[0];
                                    if (choice && choice.delta) {
                                        const delta = choice.delta;
                                        sd.reasoning += delta.reasoning_content || delta.reasoning || delta.thought || "";
                                        sd.content += delta.content || "";
                                    }
                                } catch (e) {
                                    if (e.message && !e.message.includes("JSON")) throw e;
                                }
                            }
                        }
                        updateUI();
                    }

                    if (!sd.reasoning && !sd.content && buffer.trim().startsWith('{')) {
                        try {
                            const parsed = JSON.parse(buffer);
                            if (parsed.choices && parsed.choices.length > 0) {
                                sd.content = parsed.choices[0].message.content || "";
                                sd.reasoning = parsed.choices[0].message.reasoning_content || "";
                                sd.usageData = parsed.usage || {};
                            }
                        } catch(e) {}
                    }

                    const mockData = { choices: [{ message: { content: sd.content, reasoning_content: sd.reasoning } }], usage: sd.usageData || {} };
                    renderSingleResponse(panel, mockData, model);

                    // Update thinking panel item
                    const thinkItem = multiThinkingList.querySelector(`[data-model="${CSS.escape(model)}"]`);
                    if (thinkItem) {
                        thinkItem.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-400 flex-shrink-0"></span><span class="truncate text-emerald-300/70">Done</span>`;
                    }

                    return { model, data: mockData, success: true };

                } catch (err) {
                    if (err.name === 'AbortError') {
                        statusDiv.innerHTML = `<span class="text-amber-400">Stopped</span>`;
                        contentDiv.innerHTML += '<div class="mt-4 flex items-center gap-2 text-amber-400/80 text-sm bg-amber-500/10 border border-amber-500/20 rounded-lg p-3"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>Stopped by user.</div>';
                        if (sd.content || sd.reasoning) {
                            const mockData = { choices: [{ message: { content: sd.content, reasoning_content: sd.reasoning } }], usage: sd.usageData || {} };
                            return { model, data: mockData, success: true };
                        }
                    } else {
                        statusDiv.innerHTML = `<span class="text-red-400">Error</span>`;
                        contentDiv.innerHTML = `<div class="flex items-start gap-3 text-red-300"><svg class="w-5 h-5 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg><div><div class="font-semibold text-sm mb-1">Request Failed</div><div class="text-sm text-red-300/80 font-mono">${err.message}</div></div></div>`;
                        const thinkItem = multiThinkingList.querySelector(`[data-model="${CSS.escape(model)}"]`);
                        if (thinkItem) {
                            thinkItem.innerHTML = `<span class="w-2 h-2 rounded-full bg-red-400 flex-shrink-0"></span><span class="truncate text-red-300/70">Error</span>`;
                        }
                    }
                    return { model, data: null, success: false };
                }
            });

            const results = await Promise.all(promises);

            // Save to history
            const responses = {};
            let hasAnyContent = false;
            results.forEach(r => {
                if (r.success && r.data) {
                    responses[r.model] = r.data;
                    if (r.data.choices?.[0]?.message?.content) hasAnyContent = true;
                }
            });

            if (hasAnyContent) {
                // Add to conversation context for future requests
                chatMessages.push({ role: 'user', content: promptText });
                // Use the first successful response as context
                const firstSuccess = results.find(r => r.success && r.data?.choices?.[0]?.message?.content);
                if (firstSuccess) {
                    chatMessages.push({ role: 'assistant', content: firstSuccess.data.choices[0].message.content });
                }
                renderChatContextIndicator();
                addToHistory(promptText, modelsToSend, responses, mode, uploadedFiles, chatMessages);
            }

            sendBtn.disabled = false;
            stopBtn.classList.add('hidden');
            abortControllers = {};
            multiThinkingPanel.classList.add('hidden');
            setTimeout(() => { autoScrollContainer.classList.add('hidden'); }, 2000);
        }

        marked.setOptions({ breaks: true, gfm: true });
        initHistory();
        renderSelectedModelTags();
        // Update context toggle UI
        if (!contextEnabled) document.getElementById('contextToggle').classList.remove('active');
        if (apiKeyInput.value) fetchModels();
    </script>
</body>
</html>
